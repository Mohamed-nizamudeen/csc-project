<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #8b5cf6;
    --primary-hover: #7c3aed;
    --success: #10b981;
    --success-bg: rgba(16, 185, 129, 0.15);
    --warning: #f59e0b;
    --warning-bg: rgba(245, 158, 11, 0.15);
    --bg-gradient: linear-gradient(135deg, #020617 0%, #1e1b4b 100%);
    --card-bg: rgba(255, 255, 255, 0.03);
    --card-border: rgba(255, 255, 255, 0.08);
    --danger: #ef4444;
    --danger-hover: #dc2626;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg-gradient);
    min-height: 100vh;
    color: white;
    font-family: 'Outfit', sans-serif;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 1000px;
    animation: fadeIn 0.8s ease-out;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h2 {
    font-size: 2.5rem;
    font-weight: 600;
    background: linear-gradient(to right, #a855f7, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
    margin-bottom: 10px;
  }

  .header p {
    color: #94a3b8;
    font-size: 1.1rem;
  }

  .card {
    background: var(--card-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-top: 10px;
  }

  th {
    padding: 16px;
    text-align: left;
    color: #cbd5e1;
    font-weight: 500;
    text-transform: uppercase;
    font-size: 0.85rem;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--card-border);
  }

  td {
    padding: 16px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.3s;
  }

  tr {
    transition: transform 0.2s ease, background 0.2s ease;
  }

  tr:hover td {
    background: rgba(255, 255, 255, 0.04);
  }

  .status-badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .status-pending {
    background: var(--warning-bg);
    color: var(--warning);
    border: 1px solid rgba(245, 158, 11, 0.2);
  }

  .status-done {
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  .query-type {
    background: rgba(255,255,255,0.06);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.85rem;
    border: 1px solid rgba(255,255,255,0.1);
  }

  button {
    background: var(--primary);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    font-size: 0.9rem;
    transition: all 0.3s ease;
    box-shadow: 0 4px 6px -1px rgba(139, 92, 246, 0.2);
  }

  button:hover {
    background: var(--primary-hover);
    transform: translateY(-2px);
    box-shadow: 0 6px 12px -2px rgba(139, 92, 246, 0.4);
  }

  button:active {
    transform: translateY(0);
  }

  button.btn-secondary {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: none;
  }

  button.btn-secondary:hover {
    background: rgba(255, 255, 255, 0.2);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  }

  button.btn-danger {
    background: var(--danger);
    box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);
  }

  button.btn-danger:hover {
    background: var(--danger-hover);
    box-shadow: 0 6px 12px -2px rgba(239, 68, 68, 0.4);
  }

  .action-buttons {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .completed-text {
    color: var(--success);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Loading animation */
  .loader {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
    gap: 8px;
  }

  .dot {
    width: 12px;
    height: 12px;
    background: var(--primary);
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out both;
  }

  .dot:nth-child(1) { animation-delay: -0.32s; }
  .dot:nth-child(2) { animation-delay: -0.16s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Modal Styles */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-content {
    background: #1e293b;
    border: 1px solid var(--card-border);
    border-radius: 16px;
    width: 90%;
    max-width: 500px;
    padding: 24px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: fadeIn 0.3s ease-out;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--card-border);
    padding-bottom: 12px;
  }

  .modal-header h3 {
    font-size: 1.25rem;
    font-weight: 600;
    color: white;
  }

  .close-btn {
    background: transparent;
    color: #cbd5e1;
    font-size: 1.5rem;
    padding: 0;
    box-shadow: none;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }

  .close-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: white;
    transform: none;
    box-shadow: none;
  }

  .modal-body {
    color: #cbd5e1;
    font-size: 1rem;
    line-height: 1.6;
    white-space: pre-wrap;
    max-height: 60vh;
    overflow-y: auto;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-15px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .header-actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .btn-export {
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    border: none;
    padding: 10px 22px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    font-size: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
    letter-spacing: 0.3px;
  }

  .btn-export:hover {
    background: linear-gradient(135deg, #059669, #047857);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(16, 185, 129, 0.45);
  }

  .btn-export:active {
    transform: translateY(0);
  }

  .btn-export-pdf {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
  }

  .btn-export-pdf:hover {
    background: linear-gradient(135deg, #dc2626, #b91c1c);
    box-shadow: 0 8px 20px rgba(239, 68, 68, 0.45);
  }

  @media print {
    body { background: white !important; color: black !important; padding: 20px; display: block; }
    .header-actions, .close-btn, button, .modal-overlay { display: none !important; }
    .header h2 { background: none !important; -webkit-text-fill-color: black !important; color: black !important; font-size: 1.8rem; }
    .header p, .export-hint { color: #555 !important; }
    .card { border: 1px solid #ccc !important; box-shadow: none !important; background: white !important; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 10px; color: black !important; font-size: 0.85rem; }
    th { background: #f1f5f9; font-weight: 600; }
    tr:nth-child(even) td { background: #f9fafb; }
    .status-badge { border: 1px solid #ccc !important; color: black !important; background: #e2e8f0 !important; }
    .query-type { border: 1px solid #ccc !important; background: #e2e8f0 !important; color: black !important; }
    .completed-text { color: #16a34a !important; }
  }

  .export-hint {
    color: #64748b;
    font-size: 0.8rem;
    margin-top: 8px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>Admin Dashboard</h2>
    <p>Manage and monitor customer queries seamlessly</p>
    <div class="header-actions">
      <button class="btn-export" onclick="exportCSV()" id="btn-csv">
        ⬇️ Export as CSV
      </button>
      <button class="btn-export btn-export-pdf" onclick="exportPDF()" id="btn-pdf">
        📄 Export as PDF
      </button>
    </div>
    <p class="export-hint">Download all current ticket data instantly</p>
  </div>
  
  <div class="card">
    <div id="tickets">
      <div class="loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
</div>

<!-- Query Modal -->
<div id="queryModal" class="modal-overlay" onclick="if(event.target === this) closeModal()">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Customer Query</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBodyText"></div>
  </div>
</div>

<script>
window.ticketQueries = {};

// ✅ SINGLE, FIXED LOAD FUNCTION
async function loadTickets(){
  try {
    const res = await fetch("https://csc-project.onrender.com/tickets");
    const data = await res.json();

    if (!data || data.length === 0) {
        document.getElementById("tickets").innerHTML = "<p style='text-align: center; color: #94a3b8; padding: 20px;'>No tickets found.</p>";
        return;
    }

    // Store tickets globally for export
    window.allTickets = data;

    let html = `<table>
      <tr>
        <th>Name</th>
        <th>Query Type</th>
        <th>Problem</th>
        <th>Status</th>
        <th>Action</th>
      </tr>`;

    data.forEach((t, index) => {
      window.ticketQueries[t.id] = t.message;
      const delay = index * 0.08;
      const isPending = t.status === 'Pending';
      const statusClass = isPending ? 'status-pending' : 'status-done';
      const statusIcon = isPending ? '⏳' : '✅';
      
      html += `<tr style="animation: slideIn 0.5s ease forwards; animation-delay: ${delay}s; opacity: 0;">
        <td style="font-weight: 500;">${t.name}</td>
        <td><span class="query-type">${t.query_type}</span></td>
        <td><button onclick="showQuery(${t.id})" class="btn-secondary">Show Query</button></td>
        <td><span class="status-badge ${statusClass}">${statusIcon} ${t.status}</span></td>
        <td>
          <div class="action-buttons">
            ${isPending 
              ? `<button onclick="markDone(${t.id})">Mark Done</button>` 
              : `<span class="completed-text">✅ Done</span>`}
            <button onclick="deleteTicket(${t.id})" class="btn-danger">Delete</button>
          </div>
        </td>
      </tr>`;
    });

    html += "</table>";
    document.getElementById("tickets").innerHTML = html;
  } catch (err) {
    document.getElementById("tickets").innerHTML = "<p style='text-align: center; color: #ef4444; padding: 20px;'>⚠️ Error loading database.</p>";
  }
}

// ✅ FIXED MARK DONE FUNCTION TO UPDATE FASTAPI DB
async function markDone(ticketId) {
  try {
    await fetch(`https://csc-project.onrender.com/tickets/${ticketId}`, { method: "PUT" });
    loadTickets(); // Reload the table automatically
  } catch(err) {
    alert("Failed to update ticket.");
  }
}

// ✅ DELETE TICKET FUNCTION
async function deleteTicket(ticketId) {
  if (!confirm("Are you sure you want to delete this query?")) return;
  try {
    await fetch(`https://csc-project.onrender.com/tickets/${ticketId}`, { method: "DELETE" });
    loadTickets(); // Reload the table automatically
  } catch(err) {
    alert("Failed to delete ticket.");
  }
}

// ✅ MODAL FUNCTIONS
function showQuery(ticketId) {
  const queryText = window.ticketQueries[ticketId] || "No query provided.";
  document.getElementById("modalBodyText").textContent = queryText;
  document.getElementById("queryModal").classList.add("active");
}

function closeModal() {
  document.getElementById("queryModal").classList.remove("active");
}

// ✅ EXPORT AS CSV
function exportCSV() {
  const tickets = window.allTickets;
  if (!tickets || tickets.length === 0) {
    alert("No tickets available to export.");
    return;
  }

  const headers = ["ID", "Name", "Email", "Query Type", "Message", "Status"];
  const rows = tickets.map(t => [
    t.id,
    `"${(t.name || '').replace(/"/g, '""')}"`,
    `"${(t.email || '').replace(/"/g, '""')}"`,
    `"${(t.query_type || '').replace(/"/g, '""')}"`,
    `"${(t.message || '').replace(/"/g, '""')}"`,
    t.status
  ]);

  const csvContent = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  const timestamp = new Date().toISOString().slice(0,10);
  link.setAttribute('href', url);
  link.setAttribute('download', `tickets_${timestamp}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);

  // Brief visual feedback
  const btn = document.getElementById('btn-csv');
  btn.textContent = '✅ Downloaded!';
  setTimeout(() => { btn.innerHTML = '⬇️ Export as CSV'; }, 2000);
}

// ✅ EXPORT AS PDF
function exportPDF() {
  const tickets = window.allTickets;
  if (!tickets || tickets.length === 0) {
    alert("No tickets available to export.");
    return;
  }
  // Brief visual feedback before print dialog
  const btn = document.getElementById('btn-pdf');
  btn.textContent = '⏳ Preparing...';
  setTimeout(() => {
    window.print();
    btn.innerHTML = '📄 Export as PDF';
  }, 300);
}

// Load tickets when page opens
loadTickets();
</script>

</body>
</html>
